<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0b0d12">
<title>FuelFlow — Reports</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div class="top-bar" id="top-bar"></div>
  <div class="scroll-area"><div class="page-content">
    <div class="page-hdr"><div class="page-title">Reports</div><div class="page-sub">Custom period summaries</div></div>
    <div class="sbox">
      <div class="frow">
        <div class="fg"><label>From</label><input type="date" id="rpt-from"></div>
        <div class="fg"><label>To</label><input type="date" id="rpt-to"></div>
      </div>
      <button class="btn btn-primary" onclick="genReport()">Generate Report</button>
    </div>
    <div id="rpt-out" style="display:none;">
      <div class="cards-grid" id="rpt-cards"></div>
      <div class="sbox"><div class="sbox-title">Fuel Breakdown</div><div id="rpt-fuel"></div></div>
      <div class="sbox" style="margin-top:0;"><div class="sbox-title">Day-wise Summary</div>
        <div class="tbl-wrap"><table class="gt">
          <thead><tr><th>Date</th><th>Revenue</th><th>Expenses</th><th>Profit</th></tr></thead>
          <tbody id="rpt-daily"></tbody>
        </table></div>
      </div>
      <button class="btn btn-ghost" onclick="window.print()" style="margin-bottom:12px;">🖨️ Print</button>
    </div>
  </div></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
  <div class="overlay" id="more-overlay" onclick="closeMore()"></div>
  <div class="more-menu" id="more-menu"></div>
  <div id="toast"></div>
  <div id="pin-overlay"><div style="background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px;width:300px;max-width:90vw;text-align:center;"><div style="font-size:28px;margin-bottom:8px;">🔒</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin-bottom:4px;">Settings Access</div><div style="font-size:12px;color:var(--text2);margin-bottom:20px;">Enter 4-digit PIN</div><div id="pin-dots" style="display:flex;justify-content:center;gap:12px;margin-bottom:20px;"><div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div></div><div id="pin-error" style="font-size:12px;color:var(--red);height:16px;margin-bottom:10px;"></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;"><button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button><button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button><button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button><button class="pin-key pin-key-cancel" onclick="closePinModal()">✕</button><button class="pin-key" onclick="pinKey('0')">0</button><button class="pin-key pin-key-del" onclick="pinDel()">⌫</button></div></div></div>
</div>
<script src="js/app.js"></script>
<script>
function onSyncComplete(){}
function initRpt(){const now=TODAY();document.getElementById('rpt-to').value=now;document.getElementById('rpt-from').value=now.slice(0,7)+'-01';}
function genReport(){
  const f=document.getElementById('rpt-from').value,t=document.getElementById('rpt-to').value;
  if(!f||!t){toast('Select date range');return;}
  const rows=C.entries().filter(e=>inR(e.date,f,t));if(!rows.length){toast('No data in range');return;}
  let msV=0,hsdV=0,powV=0,msA=0,hsdA=0,powA=0,tExp=0,tCred=0;
  rows.forEach(e=>{msV+=e.msV;hsdV+=e.hsdV;powV+=e.powV;msA+=e.msA;hsdA+=e.hsdA;powA+=e.powA;tExp+=e.expenses.reduce((s,x)=>s+x.amount,0);tCred+=e.creditGiven;});
  const tRev=msA+hsdA+powA;
  document.getElementById('rpt-out').style.display='block';
  document.getElementById('rpt-cards').innerHTML=`<div class="card ca"><div class="card-lbl">Revenue</div><div class="card-val">${fmt(tRev)}</div><div class="card-sub">${rows.length} days</div></div><div class="card cr"><div class="card-lbl">Expenses</div><div class="card-val">${fmt(tExp)}</div></div><div class="card cg"><div class="card-lbl">Net Profit</div><div class="card-val">${fmt(tRev-tExp)}</div></div><div class="card"><div class="card-lbl">Credit</div><div class="card-val">${fmt(tCred)}</div></div>`;
  document.getElementById('rpt-fuel').innerHTML=`<table class="gt"><thead><tr><th>Fuel</th><th>Volume (L)</th><th>Amount</th></tr></thead><tbody><tr><td><span class="badge b-ms">MS</span></td><td>${fmtV2(msV)}</td><td>${fmt(msA)}</td></tr><tr><td><span class="badge b-hsd">HSD</span></td><td>${fmtV2(hsdV)}</td><td>${fmt(hsdA)}</td></tr><tr><td><span class="badge b-pow">Power</span></td><td>${fmtV2(powV)}</td><td>${fmt(powA)}</td></tr><tr style="font-weight:700;"><td>Total</td><td>${fmtV2(msV+hsdV+powV)}</td><td style="color:var(--accent);">${fmt(tRev)}</td></tr></tbody></table>`;
  document.getElementById('rpt-daily').innerHTML=rows.map(e=>{const rev=e.msA+e.hsdA+e.powA,exp=e.expenses.reduce((s,x)=>s+x.amount,0);return `<tr><td style="white-space:nowrap;">${DS(e.date)}</td><td style="color:var(--accent);">${fmt(rev)}</td><td style="color:var(--red);">${fmt(exp)}</td><td style="color:${rev-exp>=0?'var(--green)':'var(--red)'};">${fmt(rev-exp)}</td></tr>`;}).join('');
}
document.addEventListener('DOMContentLoaded',()=>{ buildShell('Reports','more'); initRpt(); });
</script>
</body></html>
