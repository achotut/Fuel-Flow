<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0b0d12">
<title>FuelFlow — Credit</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div class="top-bar" id="top-bar"></div>
  <div class="scroll-area">
    <div class="page-content">
      <div class="page-hdr"><div class="page-title">Credit Sales</div><div class="page-sub">Ledger and recovery tracking</div></div>
      <div class="cards-grid">
        <div class="card cr"><div class="card-lbl">Outstanding</div><div class="card-val" id="cred-out">₹0</div></div>
        <div class="card cg"><div class="card-lbl">Recovered</div><div class="card-val" id="cred-rec">₹0</div></div>
      </div>
      <div class="tabs">
        <div class="tab active" onclick="crTab('ledger',this)">Ledger</div>
        <div class="tab" onclick="crTab('txns',this)">Transactions</div>
        <div class="tab" onclick="crTab('recover',this)">Recover</div>
      </div>
      <div id="cr-tab-ledger"><div class="sbox"><div class="tbl-wrap"><table class="gt">
        <thead><tr><th>Customer</th><th>Total</th><th>Paid</th><th>Due</th><th>Status</th></tr></thead>
        <tbody id="crl-body"><tr><td colspan="5"><div class="empty"><p>No customers</p></div></td></tr></tbody>
      </table></div></div></div>
      <div id="cr-tab-txns" style="display:none;"><div class="sbox"><div class="tbl-wrap"><table class="gt">
        <thead><tr><th>Date</th><th>Customer</th><th>Fuel</th><th>Amount</th><th>Type</th></tr></thead>
        <tbody id="crh-body"><tr><td colspan="5"><div class="empty"><p>No transactions</p></div></td></tr></tbody>
      </table></div></div></div>
      <div id="cr-tab-recover" style="display:none;"><div class="sbox">
        <div class="sbox-title">Record Recovery</div>
        <div class="fg"><label>Customer</label><select id="rec-cust"><option value="">Select...</option></select></div>
        <div class="frow">
          <div class="fg"><label>Date</label><input type="date" id="rec-date"></div>
          <div class="fg"><label>Amount (₹)</label><input type="number" inputmode="decimal" id="rec-amt" placeholder="0.00"></div>
        </div>
        <div class="fg"><label>Mode</label><select id="rec-mode"><option>Cash</option><option>Paytm</option><option>Bank Transfer</option><option>Cheque</option></select></div>
        <div class="fg"><label>Notes</label><input type="text" id="rec-notes"></div>
        <button class="btn btn-primary" onclick="saveRecovery()">Save Recovery</button>
      </div></div>
    </div>
  </div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
  <div class="overlay" id="more-overlay" onclick="closeMore()"></div>
  <div class="more-menu" id="more-menu"></div>
  <div id="toast"></div>
  <div id="pin-overlay"><div style="background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px;width:300px;max-width:90vw;text-align:center;"><div style="font-size:28px;margin-bottom:8px;">🔒</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin-bottom:4px;">Settings Access</div><div style="font-size:12px;color:var(--text2);margin-bottom:20px;">Enter 4-digit PIN</div><div id="pin-dots" style="display:flex;justify-content:center;gap:12px;margin-bottom:20px;"><div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div></div><div id="pin-error" style="font-size:12px;color:var(--red);height:16px;margin-bottom:10px;"></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;"><button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button><button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button><button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button><button class="pin-key pin-key-cancel" onclick="closePinModal()">✕</button><button class="pin-key" onclick="pinKey('0')">0</button><button class="pin-key pin-key-del" onclick="pinDel()">⌫</button></div></div></div>
</div>
<script src="js/app.js"></script>
<script>
function onSyncComplete(){ renderCredit(); }

function crTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  ['ledger','txns','recover'].forEach(t=>document.getElementById('cr-tab-'+t).style.display=t===tab?'block':'none');
  if(tab==='recover'){
    const custs=[...new Set(C.credits().map(c=>c.customer))];
    document.getElementById('rec-cust').innerHTML='<option value="">Select...</option>'+custs.map(c=>`<option>${c}</option>`).join('');
    document.getElementById('rec-date').value=TODAY();
  }
}
function renderCredit(){
  const credits=C.credits(),recs=C.recoveries();
  const totC=credits.reduce((s,c)=>s+c.amount,0),totR=recs.reduce((s,r)=>s+r.amount,0);
  document.getElementById('cred-out').textContent=fmt(Math.max(0,totC-totR));
  document.getElementById('cred-rec').textContent=fmt(totR);
  const cm={};
  credits.forEach(c=>{if(!cm[c.customer])cm[c.customer]={total:0,paid:0,last:c.date};cm[c.customer].total+=c.amount;if(c.date>cm[c.customer].last)cm[c.customer].last=c.date;});
  recs.forEach(r=>{if(cm[r.customer]){cm[r.customer].paid+=r.amount;if(r.date>cm[r.customer].last)cm[r.customer].last=r.date;}});
  const custs=Object.keys(cm);
  const lb=document.getElementById('crl-body');
  if(!custs.length)lb.innerHTML='<tr><td colspan="5"><div class="empty"><p>No customers</p></div></td></tr>';
  else lb.innerHTML=custs.map(c=>{const d=cm[c],out=d.total-d.paid,st=out<=0?'<span class="badge b-ok">CLEAR</span>':d.paid>0?'<span class="badge b-partial">PART</span>':'<span class="badge b-pending">DUE</span>';return `<tr><td style="font-weight:600;">${c}</td><td>${fmt(d.total)}</td><td>${fmt(d.paid)}</td><td style="color:${out>0?'var(--red)':'var(--green)'};font-weight:600;">${fmt(out)}</td><td>${st}</td></tr>`;}).join('');
  const allTx=[...credits.map(c=>({...c,type:'credit'})),...recs.map(r=>({...r,type:'recovery',fuel:'—'}))].sort((a,b)=>b.date.localeCompare(a.date));
  const hb=document.getElementById('crh-body');
  if(!allTx.length)hb.innerHTML='<tr><td colspan="5"><div class="empty"><p>No transactions</p></div></td></tr>';
  else hb.innerHTML=allTx.map(t=>`<tr><td style="white-space:nowrap;">${DS(t.date)}</td><td style="font-weight:600;">${t.customer}</td><td>${t.fuel!=='—'?`<span class="badge b-${t.fuel.toLowerCase()}">${t.fuel}</span>`:'—'}</td><td style="color:${t.type==='credit'?'var(--red)':'var(--green)'};font-weight:600;">${t.type==='credit'?'−':'+'}${fmt(t.amount)}</td><td><span class="badge ${t.type==='credit'?'b-pending':'b-ok'}">${t.type==='credit'?'CR':'REC'}</span></td></tr>`).join('');
}
async function saveRecovery(){
  const cust=document.getElementById('rec-cust').value,date=document.getElementById('rec-date').value,amt=parseFloat(document.getElementById('rec-amt').value)||0,mode=document.getElementById('rec-mode').value,notes=document.getElementById('rec-notes').value;
  if(!cust||!amt){toast('Select customer and enter amount');return;}
  try{await sb('credit_recoveries','POST',{recovery_date:date,customer:cust,amount:amt,mode,notes});toast('✅ Recovery saved!');await syncNow();renderCredit();document.getElementById('rec-amt').value='';document.getElementById('rec-notes').value='';}
  catch(e){toast('⚠ Save failed');console.error(e);}
}
document.addEventListener('DOMContentLoaded',()=>{ buildShell('Credit Sales','credit'); renderCredit(); });
</script>
</body></html>
