<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes"><meta name="theme-color" content="#0b0d12">
<title>FuelFlow — Employees</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@600;700;800&family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app">
  <div class="top-bar" id="top-bar"></div>
  <div class="scroll-area"><div class="page-content">
    <div class="page-hdr"><div class="page-title">Employees</div><div class="page-sub">Staff and advance management</div></div>
    <div class="cards-grid">
      <div class="card cb"><div class="card-lbl">Staff</div><div class="card-val" id="emp-cnt">0</div></div>
      <div class="card cr"><div class="card-lbl">Advances</div><div class="card-val" id="emp-adv-tot">₹0</div></div>
    </div>
    <div class="tabs">
      <div class="tab active" onclick="empTab('overview',this)">Overview</div>
      <div class="tab" onclick="empTab('log',this)">Log</div>
      <div class="tab" onclick="empTab('settle',this)">Settle</div>
    </div>
    <div id="emp-tab-overview"><div id="emp-cards"><div class="empty"><p>No employees. Add in Settings.</p></div></div></div>
    <div id="emp-tab-log" style="display:none;"><div class="sbox"><div class="tbl-wrap"><table class="gt">
      <thead><tr><th>Date</th><th>Name</th><th>Amount</th><th>Type</th></tr></thead>
      <tbody id="emp-log"><tr><td colspan="4"><div class="empty"><p>No transactions</p></div></td></tr></tbody>
    </table></div></div></div>
    <div id="emp-tab-settle" style="display:none;"><div class="sbox">
      <div class="sbox-title">Settle Advance</div>
      <div class="fg"><label>Employee</label><select id="settle-emp"><option value="">Select...</option></select></div>
      <div class="frow">
        <div class="fg"><label>Date</label><input type="date" id="settle-date"></div>
        <div class="fg"><label>Amount (₹)</label><input type="number" inputmode="decimal" id="settle-amt" placeholder="0.00"></div>
      </div>
      <div class="fg"><label>Mode</label><select id="settle-mode"><option>Salary Deduction</option><option>Cash Return</option><option>Other</option></select></div>
      <div class="fg"><label>Notes</label><input type="text" id="settle-notes"></div>
      <button class="btn btn-primary" onclick="saveSettlement()">Record Settlement</button>
    </div></div>
  </div></div>
  <nav class="bottom-nav" id="bottom-nav"></nav>
  <div class="overlay" id="more-overlay" onclick="closeMore()"></div>
  <div class="more-menu" id="more-menu"></div>
  <div id="toast"></div>
  <div id="pin-overlay"><div style="background:var(--surf);border:1px solid var(--border);border-radius:var(--r);padding:28px 24px;width:300px;max-width:90vw;text-align:center;"><div style="font-size:28px;margin-bottom:8px;">🔒</div><div style="font-family:'Syne',sans-serif;font-weight:800;font-size:18px;margin-bottom:4px;">Settings Access</div><div style="font-size:12px;color:var(--text2);margin-bottom:20px;">Enter 4-digit PIN</div><div id="pin-dots" style="display:flex;justify-content:center;gap:12px;margin-bottom:20px;"><div class="pin-dot" id="pd0"></div><div class="pin-dot" id="pd1"></div><div class="pin-dot" id="pd2"></div><div class="pin-dot" id="pd3"></div></div><div id="pin-error" style="font-size:12px;color:var(--red);height:16px;margin-bottom:10px;"></div><div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;"><button class="pin-key" onclick="pinKey('1')">1</button><button class="pin-key" onclick="pinKey('2')">2</button><button class="pin-key" onclick="pinKey('3')">3</button><button class="pin-key" onclick="pinKey('4')">4</button><button class="pin-key" onclick="pinKey('5')">5</button><button class="pin-key" onclick="pinKey('6')">6</button><button class="pin-key" onclick="pinKey('7')">7</button><button class="pin-key" onclick="pinKey('8')">8</button><button class="pin-key" onclick="pinKey('9')">9</button><button class="pin-key pin-key-cancel" onclick="closePinModal()">✕</button><button class="pin-key" onclick="pinKey('0')">0</button><button class="pin-key pin-key-del" onclick="pinDel()">⌫</button></div></div></div>
</div>
<script src="js/app.js"></script>
<script>
function onSyncComplete(){ renderEmployees(); }
function empTab(tab,el){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));el.classList.add('active');
  ['overview','log','settle'].forEach(t=>document.getElementById('emp-tab-'+t).style.display=t===tab?'block':'none');
  if(tab==='settle'){const s=C.settings();document.getElementById('settle-emp').innerHTML='<option value="">Select...</option>'+(s.employees||[]).map(e=>`<option value="${e.name}">${e.name}</option>`).join('');document.getElementById('settle-date').value=TODAY();}
}
function renderEmployees(){
  const s=C.settings(),emps=s.employees||[],advs=C.advances(),setts=C.settlements();
  document.getElementById('emp-cnt').textContent=emps.length;
  document.getElementById('emp-adv-tot').textContent=fmt(advs.reduce((s,a)=>s+a.amount,0));
  const ec=document.getElementById('emp-cards');
  if(!emps.length){ec.innerHTML='<div class="empty"><p>No employees. Add in Settings.</p></div>';}
  else ec.innerHTML=emps.map(e=>{const eAdv=advs.filter(a=>a.employee===e.name).reduce((s,a)=>s+a.amount,0),eSett=setts.filter(a=>a.employee===e.name).reduce((s,a)=>s+a.amount,0),pending=eAdv-eSett;return `<div class="emp-row"><div><div class="emp-row-name">${e.name}</div><div style="font-size:11px;color:var(--text3);">${e.role||'Staff'}</div></div><div class="emp-row-bal" style="color:${pending>0?'var(--red)':'var(--green)'};">${pending>0?fmt(pending)+' due':'Settled'}</div></div>`;}).join('');
  const allTx=[...advs.map(a=>({...a,txType:'Advance'})),...setts.map(a=>({...a,txType:'Settlement'}))].sort((a,b)=>b.date.localeCompare(a.date));
  const log=document.getElementById('emp-log');
  if(!allTx.length)log.innerHTML='<tr><td colspan="4"><div class="empty"><p>No transactions</p></div></td></tr>';
  else log.innerHTML=allTx.map(t=>`<tr><td style="white-space:nowrap;">${DS(t.date)}</td><td style="font-weight:600;">${t.employee}</td><td style="color:${t.txType==='Advance'?'var(--red)':'var(--green)'};font-weight:600;">${t.txType==='Advance'?'−':'+'}${fmt(t.amount)}</td><td><span class="badge ${t.txType==='Advance'?'b-pending':'b-ok'}">${t.txType==='Advance'?'ADV':'SET'}</span></td></tr>`).join('');
}
async function saveSettlement(){
  const emp=document.getElementById('settle-emp').value,date=document.getElementById('settle-date').value,amt=parseFloat(document.getElementById('settle-amt').value)||0,mode=document.getElementById('settle-mode').value,notes=document.getElementById('settle-notes').value;
  if(!emp||!amt){toast('Select employee and enter amount');return;}
  try{await sb('advance_settlements','POST',{settlement_date:date,employee_name:emp,amount:amt,mode,notes});toast('✅ Settlement saved!');await syncNow();renderEmployees();document.getElementById('settle-amt').value='';document.getElementById('settle-notes').value='';}
  catch(e){toast('⚠ Save failed');console.error(e);}
}
document.addEventListener('DOMContentLoaded',()=>{ buildShell('Employees','more'); renderEmployees(); });
</script>
</body></html>
